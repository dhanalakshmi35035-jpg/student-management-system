{% extends 'polls/base.html' %}

{% block content %}

<h2>Add Mark</h2>
<!DOCTYPE html>
<html>
<head>

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial;

    background: linear-gradient(135deg, #74ebd5, #ACB6E5);
}
</style>
    <title>Add Marks</title>
</head>
<body>

    {{ form.as_p }}

<a href="{% url 'marks_list' %}">
    View Marks
</a>

</body>
</html>
