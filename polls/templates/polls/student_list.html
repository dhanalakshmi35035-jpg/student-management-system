{% extends 'polls/base.html' %}

{% block content %}

    <br><br>

    <h2>Student List</h2>

    <table class="table table-bordered table-striped table-hover">

        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Roll No</th>
                <th>Department</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
        {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.roll_no }}</td>
                <td>{{ student.department }}</td>
                <td>{{ student.email }}</td>

                <td>
                    <a href="{% url 'edit_student' student.id %}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <a href="{% url 'delete_student' student.id %}" class="btn btn-danger btn-sm">
                        Delete
                    </a>

                    <a href="{% url 'student_pdf' student.id %}" class="btn btn-success btn-sm">
                        Download PDF
                    </a>

                    <a href="{% url 'id_card' student.id %}" class="btn btn-info btn-sm">
                        ID Card
                    </a>
                </td>

            </tr>
        {% endfor %}
        </tbody>

    </table>

{% endblock %}
