<!DOCTYPE html>
<html>
<head>
    
    <title>Attendance List</title>
</head>
<body>

<h1>Attendance List</h1>

<table border="1">
    <tr>
        <th>Student</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for record in attendance_records %}
    <tr>
        <td>{{ record.student.name }}</td>
        <td>{{ record.date }}</td>
        <td>{{ record.status }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
